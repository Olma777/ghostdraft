name: ci
on: [push, pull_request]
jobs:
  test:
    # Linux-раннер: бесплатные минуты. ghostdraft scaffold — чистая логика
    # (shellcheck + vendor-check + bats); macOS-примитивы стабятся в тестах.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: Lint
        run: shellcheck ghostdraft install.sh tools/vendor-common.sh
      - name: Vendored common is in sync with pinned securetrash
        run: ./tools/vendor-common.sh --check
      - name: Unit tests
        run: bats test/

  windows:
    # Windows-порт (PowerShell, BETA): ghostdraft трогает editor/shred/clipboard, поэтому
    # Pester проверяет оркестровку (выбор каталога, shred-в-finally, --clipboard-гейт) с
    # замоканными внешними эффектами.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
      - name: Pester (ghostdraft.ps1 orchestration + installer integrity gate)
        shell: pwsh
        run: |
          $r = Invoke-Pester windows/test -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed" }
